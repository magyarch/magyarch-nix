bind[stack_dec]		= MOD+Control+Down
bind[stack_inc]		= MOD+Control+Up
bind[stack_reset]	= MOD+Control+s
bind[swap_main]		= MOD+Shift+h
bind[swap_next]		= MOD+Shift+j
bind[swap_prev]		= MOD+Shift+k
